<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼豆跳跳消</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f4f8;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            background-color: #fff;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #333;
            z-index: 100;
        }
        
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #f00;
            text-align: center;
            max-width: 80%;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="loading" id="loading">加载中...</div>
        <canvas id="gameCanvas" style="display: none;"></canvas>
    </div>
    
    <script>
        // 错误处理
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error: ', msg, ' at ', url, ':', lineNo);
            document.getElementById('loading').style.display = 'none';
            var errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.innerHTML = '游戏加载失败<br>' + msg + '<br>请刷新页面重试';
            document.body.appendChild(errorDiv);
            return false;
        };
    </script>
    
    <!-- 按正确顺序加载JavaScript文件 -->
    <script src="js/libs/tinyemitter.js"></script>
    <script src="js/base/pool.js"></script>
    <script src="js/runtime/logger.js"></script>
    <script src="js/runtime/resourceloader.js"></script>
    <script src="js/runtime/admanager.js"></script>
    <script src="js/runtime/authmanager.js"></script>
    <script src="js/render.js"></script>
    <script src="js/databus.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/runtime/music.js"></script>
    <script src="js/runtime/gameinfo.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        // 等待所有脚本加载完成后初始化游戏
        window.addEventListener('load', function() {
            setTimeout(function() {
                try {
                    console.log('Starting game initialization...');
                    
                    // 隐藏加载提示
                    document.getElementById('loading').style.display = 'none';
                    // 显示canvas
                    document.getElementById('gameCanvas').style.display = 'block';
                    
                    // 检查所有必要的类是否已加载
                    if (typeof Main === 'undefined') {
                        throw new Error('Main class not found');
                    }
                    if (typeof DataBus === 'undefined') {
                        throw new Error('DataBus class not found');
                    }
                    if (typeof GameInfo === 'undefined') {
                        throw new Error('GameInfo class not found');
                    }
                    if (typeof Music === 'undefined') {
                        throw new Error('Music class not found');
                    }
                    
                    // 检查canvas是否可用
                    if (typeof canvas === 'undefined' || !canvas) {
                        console.log('Canvas not initialized, initializing now...');
                        // 手动初始化canvas
                        canvas = document.getElementById('gameCanvas');
                        if (canvas) {
                            canvas.width = 375;
                            canvas.height = 667;
                            
                            // 设置CSS样式，保持宽高比
                            var scaleX = window.innerWidth / 375;
                            var scaleY = window.innerHeight / 667;
                            var scale = Math.min(scaleX, scaleY);
                            
                            canvas.style.width = (375 * scale) + 'px';
                            canvas.style.height = (667 * scale) + 'px';
                            canvas.style.position = 'absolute';
                            canvas.style.left = ((window.innerWidth - 375 * scale) / 2) + 'px';
                            canvas.style.top = ((window.innerHeight - 667 * scale) / 2) + 'px';
                            
                            window.canvas = canvas;
                            window.canvasScale = scale;
                            window.canvasOffsetLeft = (window.innerWidth - 375 * scale) / 2;
                            window.canvasOffsetTop = (window.innerHeight - 667 * scale) / 2;
                            
                            console.log('Canvas initialized successfully');
                        } else {
                            throw new Error('Canvas element not found');
                        }
                    }
                    
                    // 初始化游戏
                    console.log('Initializing game...');
                    new Main();
                    console.log('Game initialized successfully');
                } catch (error) {
                    console.error('Failed to initialize game:', error);
                    document.getElementById('loading').style.display = 'none';
                    var errorDiv = document.createElement('div');
                    errorDiv.className = 'error';
                    errorDiv.innerHTML = '游戏初始化失败<br>' + error.message + '<br>请刷新页面重试';
                    document.body.appendChild(errorDiv);
                }
            }, 100); // 延迟100ms确保所有脚本都已完全加载
        });
        
        // 监听窗口大小变化
        window.addEventListener('resize', function() {
            if (window.canvas) {
                var scaleX = window.innerWidth / 375;
                var scaleY = window.innerHeight / 667;
                var scale = Math.min(scaleX, scaleY);
                
                window.canvas.style.width = (375 * scale) + 'px';
                window.canvas.style.height = (667 * scale) + 'px';
                window.canvas.style.left = ((window.innerWidth - 375 * scale) / 2) + 'px';
                window.canvas.style.top = ((window.innerHeight - 667 * scale) / 2) + 'px';
                
                window.canvasScale = scale;
                window.canvasOffsetLeft = (window.innerWidth - 375 * scale) / 2;
                window.canvasOffsetTop = (window.innerHeight - 667 * scale) / 2;
                
                console.log('Window resized, scale:', scale);
            }
        });
    </script>
</body>
</html>
