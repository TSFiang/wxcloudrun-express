<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>拼豆跳跳消</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
            border: 1px solid #ccc;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 18px;
            color: #333;
        }
        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #f00;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">加载中...</div>
    <canvas id="gameCanvas" width="375" height="667" style="display: none;"></canvas>
    
    <script>
        // 错误处理
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('Error: ', msg, ' at ', url, ':', lineNo);
            document.getElementById('loading').style.display = 'none';
            var errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.innerHTML = '游戏加载失败<br>' + msg + '<br>请刷新页面重试';
            document.body.appendChild(errorDiv);
            return false;
        };
    </script>
    
    <!-- 按正确顺序加载JavaScript文件 -->
    <script src="js/libs/tinyemitter.js"></script>
    <script src="js/base/pool.js"></script>
    <script src="js/render.js"></script>
    <script src="js/databus.js"></script>
    <script src="js/runtime/music.js"></script>
    <script src="js/runtime/gameinfo.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        // 等待所有脚本加载完成后初始化游戏
        window.onload = function() {
            try {
                // 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
                // 显示canvas
                document.getElementById('gameCanvas').style.display = 'block';
                
                // 检查所有必要的类是否已加载
                if (typeof Main === 'undefined') {
                    throw new Error('Main class not found');
                }
                if (typeof DataBus === 'undefined') {
                    throw new Error('DataBus class not found');
                }
                if (typeof GameInfo === 'undefined') {
                    throw new Error('GameInfo class not found');
                }
                if (typeof Music === 'undefined') {
                    throw new Error('Music class not found');
                }
                
                // 初始化游戏
                console.log('Initializing game...');
                new Main();
                console.log('Game initialized successfully');
            } catch (error) {
                console.error('Failed to initialize game:', error);
                document.getElementById('loading').style.display = 'none';
                var errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.innerHTML = '游戏初始化失败<br>' + error.message + '<br>请刷新页面重试';
                document.body.appendChild(errorDiv);
            }
        };
    </script>
</body>
</html>
